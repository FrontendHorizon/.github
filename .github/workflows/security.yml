name: security

# Reusable security workflow — Dependency Review + Gitleaks. Both free
# on private repos, no GHAS required.
#
# CodeQL is intentionally NOT here: it requires GitHub Advanced Security
# for private repos and the org isn't on that plan today. When/if that
# changes, opt in by calling `codeql.yml` from a repo's workflow alongside
# this one.
#
# Call from a repo's workflow:
#
#   jobs:
#     security:
#       uses: FrontendHorizon/.github/.github/workflows/security.yml@main

on:
  workflow_call:

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so gitleaks can scan past commits for already-
          # leaked secrets, not just the current diff.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

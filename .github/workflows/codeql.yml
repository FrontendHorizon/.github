name: codeql

# Reusable CodeQL workflow — opt-in.
#
# REQUIRES GitHub Advanced Security on the calling repo (private repos
# only; public repos get CodeQL for free). Without GHAS the analysis
# runs but the upload step fails with "Code Security must be enabled."
#
# Call from a repo's workflow ONLY when GHAS is enabled:
#
#   on:
#     push:
#       branches: [main]
#     pull_request:
#     schedule:
#       - cron: '0 6 * * 1'
#   permissions:
#     contents: read
#     security-events: write
#     actions: read
#   jobs:
#     codeql:
#       uses: FrontendHorizon/.github/.github/workflows/codeql.yml@main

on:
  workflow_call:

jobs:
  analyze:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, actions]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
